name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Production Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Notify Discord
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -s -H "Content-Type: application/json" \
              -d '{"embeds":[{"title":"Deployed: andy-brain","description":"${{ github.event.head_commit.message }}","color":3066993,"url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}' \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          else
            curl -s -H "Content-Type: application/json" \
              -d '{"embeds":[{"title":"Deploy Failed: andy-brain","description":"Branch: ${{ github.ref_name }}","color":15158332,"url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}' \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          fi
